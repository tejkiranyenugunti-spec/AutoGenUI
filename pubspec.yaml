name: guardian_hud
description: "Generative HUD - AI-powered emergency assistant for drivers"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_generative_ai: ^0.4.6
  speech_to_text: ^7.0.0
  flutter_animate: ^4.5.0
  permission_handler: ^11.3.1
  http: ^1.2.2
  genui: ^0.9.2
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/bg-image.jpg
    - .env
